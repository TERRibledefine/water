
  # 手动触发开关（测试用）
  workflow_dispatch:

# 执行任务
jobs:
  run-pangguai-script:
    # 运行环境（Ubuntu 最新版）
    runs-on: ubuntu-latest
    steps:
      # 步骤1：拉取仓库代码到运行环境
      - name: 拉取仓库代码
        uses: actions/checkout@v4

      # 步骤2：配置 Python 环境
      - name: 安装 Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 步骤3：安装脚本依赖
      - name: 安装 requests 库
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 步骤4：执行胖乖自动任务脚本
      - name: 运行胖乖脚本
        run: |
          python main.py
